name: Generate Contribution Snake

on:
  # Run exactly every 12 hours (at minute 0 of hour 0 and 12)
  schedule:
    - cron: "0 */12 * * *"
  # Allow manual trigger
  workflow_dispatch:
  # Regenerate when pushing to main
  push:
    branches:
      - main

# Avoid overlapping runs if one is still executing
concurrency:
  group: snake-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Generate snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          # Light theme
          outputs: dist/snake.svg
          # Uncomment for dark variant:
          # outputs: dist/snake.svg dist/snake-dark.svg?palette=github-dark

      - name: Publish snake.svg to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
